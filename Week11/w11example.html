<body>
    <h1>Week 11: Introduction to Forms</h1>
    <p>This is a simple example of a form.</p>

    <form action="#" method="get">
        <div>
            <label for="fname">First Name:</label>
            <input type="text" method="get" id="fname" name="fname">
        </div>
        <div>
            <label for="lname">Last Name:</label>
            <input type="text" method="get" id>
        </div>
        <input type="submit" value="Submit">
    </form>
